<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遞酒樓 薪資記錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9A84C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="薪資記錄">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9A84C; --gold-dim: #8a6d2e; --bg: #0e0b08;
  --surface: #1a1510; --surface2: #221c14;
  --border: rgba(201,168,76,0.2); --border2: rgba(201,168,76,0.4);
  --text: #f0e8d5; --text-dim: #8a7d65; --red: #c0392b;
}
html, body { min-height: 100vh; background: var(--bg); }
body { font-family: 'Noto Sans TC', sans-serif; color: var(--text); font-size: 14px; display: flex; justify-content: center; padding: 20px 12px 40px; }
.app { width: 100%; max-width: 480px; }

/* LOGIN */
#screen-login { display: flex; flex-direction: column; align-items: center; padding: 48px 0 0; }
.login-logo { font-size: 22px; color: var(--gold); letter-spacing: 3px; margin-bottom: 6px; }
.login-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 40px; }
.login-box { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
.login-box-title { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 14px; }
.user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.user-row:last-child { margin-bottom: 0; }
.user-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.2s; }
.user-btn:hover { border-color: var(--gold); }
.user-info { display: flex; align-items: center; gap: 12px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); color: #0e0b08; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.user-arrow { color: var(--text-dim); }
.del-user-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text-dim); cursor: pointer; font-size: 12px; flex-shrink: 0; }
.del-user-btn:hover { color: var(--red); border-color: var(--red); }
.new-user-form { display: flex; gap: 8px; width: 100%; }
.new-user-form input { flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
.new-user-form input:focus { border-color: var(--gold); }
.new-user-form button { flex-shrink: 0; background: var(--gold); border: none; border-radius: 8px; padding: 10px 14px; color: #0e0b08; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
.no-users { font-size: 12px; color: var(--text-dim); text-align: center; padding: 10px 0; letter-spacing: 1px; }

/* MAIN APP */
#screen-app { display: none; background: var(--bg); border-radius: 16px; border: 1px solid var(--border2); overflow: hidden; }
.hdr { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--gold); color: #0e0b08; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.hdr-title { font-size: 14px; color: var(--gold); letter-spacing: 1px; }
.hdr-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.btn-logout { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text-dim); font-family: inherit; font-size: 11px; cursor: pointer; }
.btn-logout:hover { color: var(--text); border-color: var(--border2); }

.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border2); }
.tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; cursor: pointer; color: var(--text-dim); border: none; background: none; font-family: inherit; letter-spacing: 1px; transition: color 0.2s; }
.tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
.view { display: none; padding: 18px; }
.view.active { display: block; }

.month-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.month-bar select { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; appearance: none; cursor: pointer; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.sum-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; text-align: center; }
.sum-card.highlight { border-color: var(--gold); background: var(--surface2); }
.sum-num { font-size: 22px; font-weight: 700; color: var(--gold); }
.sum-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: 1px; }

.form-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.sec-title { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
.fg input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
.fg input:focus { border-color: var(--gold); }

.preview-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-dim); }
.preview-row:last-child { border-bottom: none; }
.preview-row .val { color: var(--gold); font-size: 13px; font-weight: 500; }

.btn-add { width: 100%; padding: 12px; background: var(--gold); color: #0e0b08; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; font-weight: 700; cursor: pointer; letter-spacing: 2px; transition: opacity 0.2s; margin-top: 4px; }
.btn-add:hover { opacity: 0.85; }
.msg { text-align: center; font-size: 12px; margin-top: 10px; color: var(--gold); min-height: 18px; letter-spacing: 1px; }

.rec-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.rec-date { font-size: 13px; color: var(--text); }
.rec-total { font-size: 16px; color: var(--gold); font-weight: 700; }
.rec-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
.btn-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 0 4px; font-family: inherit; }
.btn-del:hover { color: var(--red); }
.empty { text-align: center; color: var(--text-dim); font-size: 12px; padding: 40px 0; letter-spacing: 1px; }

.big-salary { text-align: center; padding: 28px 0 20px; }
.big-salary .amount { font-size: 42px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
.big-salary .label { font-size: 12px; color: var(--text-dim); margin-top: 6px; letter-spacing: 2px; }
.breakdown { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
.bk-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
.bk-row:last-child { border-bottom: none; }
.bk-label { color: var(--text-dim); }
.bk-val { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div class="app">

  <!-- LOGIN SCREEN -->
  <div id="screen-login">
    <div class="login-logo">遞酒樓 薪資記錄</div>
    <div class="login-sub">個人出勤與業績追蹤</div>

    <div class="login-box">
      <div class="login-box-title">選擇帳號</div>
      <div id="user-list"></div>
    </div>

    <div class="login-box">
      <div class="login-box-title">建立新帳號</div>
      <div class="new-user-form">
        <input type="text" id="new-name" placeholder="名字" maxlength="12">
        <input type="password" id="new-pin" placeholder="4位密碼" maxlength="4" inputmode="numeric" style="flex-shrink:0;width:90px;">
        <button onclick="createUser()">建立</button>
      </div>
    </div>
  </div>

  <!-- PIN OVERLAY -->
  <div id="pin-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:280px;text-align:center;">
      <div style="font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;" id="pin-username"></div>
      <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:18px;">請輸入 4 位密碼</div>
      <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" style="width:100%;text-align:center;font-size:24px;letter-spacing:8px;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;outline:none;margin-bottom:14px;">
      <div style="display:flex;gap:8px;">
        <button onclick="cancelPin()" style="flex:1;padding:10px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:inherit;cursor:pointer;">取消</button>
        <button onclick="confirmPin()" style="flex:1;padding:10px;background:var(--gold);border:none;border-radius:8px;color:#0e0b08;font-family:inherit;font-weight:700;cursor:pointer;">確認</button>
      </div>
      <div id="pin-err" style="font-size:12px;color:var(--red);margin-top:10px;min-height:16px;"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app">
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-avatar" id="hdr-avatar"></div>
        <div>
          <div class="hdr-title" id="hdr-name"></div>
          <div class="hdr-sub">遞酒樓 薪資記錄</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">切換帳號</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('add')">新增班次</button>
      <button class="tab" onclick="switchTab('history')">出勤記錄</button>
      <button class="tab" onclick="switchTab('stats')">當月薪資</button>
    </div>

    <div class="view active" id="view-add">
      <div class="month-bar">
        <select id="sel-month" onchange="renderSummary()"></select>
      </div>
      <div class="summary-grid" id="mini-summary"></div>

      <div class="form-section">
        <div class="sec-title">出勤時間</div>
        <div class="form-grid three">
          <div class="fg"><label>日期</label><input type="date" id="f-date"></div>
          <div class="fg"><label>上班</label><input type="time" id="f-start"></div>
          <div class="fg"><label>下班</label><input type="time" id="f-end"></div>
        </div>
      </div>

      <div class="form-section">
        <div class="sec-title">業績</div>
        <div class="form-grid">
          <div class="fg"><label>螢光棒（支）</label><input type="number" id="f-glow" placeholder="0" min="0" oninput="updatePreview()"></div>
          <div class="fg"><label>鎖台（次）</label><input type="number" id="f-lock" placeholder="0" min="0" oninput="updatePreview()"></div>
        </div>
        <div style="margin-top:10px;">
          <div class="fg"><label>訂位消費金額（元）</label><input type="number" id="f-booking" placeholder="0" min="0" oninput="updatePreview()"></div>
        </div>
      </div>

      <div class="form-section">
        <div class="sec-title">本場試算</div>
        <div id="preview-rows"></div>
        <div class="preview-row" style="border-top:1px solid var(--border2);margin-top:6px;padding-top:10px;">
          <span style="color:var(--text);font-size:13px;font-weight:500;">本場合計</span>
          <span class="val" id="prev-total" style="font-size:17px;">$0</span>
        </div>
      </div>

      <button class="btn-add" onclick="addRecord()">儲存這班</button>
      <div class="msg" id="msg"></div>
    </div>

    <div class="view" id="view-history">
      <div class="month-bar">
        <select id="sel-month2" onchange="renderHistory()"></select>
        <button onclick="clearMonth()" style="background:none;border:none;color:var(--red);font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;padding:0 8px;">清除本月</button>
      </div>
      <div id="records-list"></div>
    </div>

    <div class="view" id="view-stats">
      <div class="month-bar">
        <select id="sel-month3" onchange="renderStats()"></select>
      </div>
      <div class="big-salary">
        <div class="amount" id="st-total">$0</div>
        <div class="label">本月薪資總計</div>
      </div>
      <div class="breakdown" id="st-breakdown"></div>
    </div>
  </div>

</div>
<script>
var currentUser = null;
var records = [];

function getUsers() {
  try {
    var raw = JSON.parse(localStorage.getItem('djl_users') || '[]');
    // migrate old format (array of strings)
    return raw.map(function(u){ return typeof u==='string' ? {name:u,pin:''} : u; });
  } catch(e) { return []; }
}
function saveUsers(u) { localStorage.setItem('djl_users', JSON.stringify(u)); }
function getRecords() {
  if (!currentUser) return [];
  try { return JSON.parse(localStorage.getItem('djl_rec_' + currentUser) || '[]'); } catch(e) { return []; }
}
// currentUser is always the name string
function save() { if (currentUser) localStorage.setItem('djl_rec_' + currentUser, JSON.stringify(records)); }
function initial(name) { return name ? name.slice(0,1).toUpperCase() : '?'; }

function renderUserList() {
  var users = getUsers();
  var el = document.getElementById('user-list');
  if (!users.length) { el.innerHTML = '<div class="no-users">尚無帳號，請在下方建立</div>'; return; }
  el.innerHTML = users.map(function(u) {
    var n = u.name;
    var btn = '<button class="user-btn" onclick="askPin(\'' + n + '\')">'+
        '<div class="user-info"><div class="user-avatar">' + initial(n) + '</div><span>' + n + '</span></div>' +
        '<span class="user-arrow">›</span>' +
      '</button>';
    var del = '<button class="del-user-btn" onclick="deleteUser(\'' + n + '\')">刪除</button>';
    return '<div class="user-row">' + btn + del + '</div>';
  }).join('');
}

function createUser() {
  var name = document.getElementById('new-name').value.trim();
  var pin = document.getElementById('new-pin').value.trim();
  if (!name) { alert('請輸入名字'); return; }
  if (pin.length !== 4 || !/^[0-9]{4}$/.test(pin)) { alert('請輸入4位數字密碼'); return; }
  var users = getUsers();
  if (users.find(function(u){return u.name===name;})) { alert('這個名字已經存在'); return; }
  users.push({name:name,pin:pin});
  saveUsers(users);
  document.getElementById('new-name').value = '';
  document.getElementById('new-pin').value = '';
  renderUserList();
}

function deleteUser(name) {
  if (!confirm('確定刪除「' + name + '」的帳號與所有記錄？')) return;
  saveUsers(getUsers().filter(function(u) { return u.name !== name; }));
  localStorage.removeItem('djl_rec_' + name);
  renderUserList();
}

var pinTarget = null;
function askPin(name) {
  pinTarget = name;
  document.getElementById('pin-username').textContent = name;
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-err').textContent = '';
  var ov = document.getElementById('pin-overlay');
  ov.style.display = 'flex';
  setTimeout(function(){ document.getElementById('pin-input').focus(); }, 100);
}
function cancelPin() {
  document.getElementById('pin-overlay').style.display = 'none';
  pinTarget = null;
}
function confirmPin() {
  var entered = document.getElementById('pin-input').value;
  var users = getUsers();
  var user = users.find(function(u){ return u.name === pinTarget; });
  if (!user || entered !== user.pin) {
    document.getElementById('pin-err').textContent = '密碼錯誤，請再試一次';
    document.getElementById('pin-input').value = '';
    return;
  }
  document.getElementById('pin-overlay').style.display = 'none';
  loginAs(pinTarget);
  pinTarget = null;
}

function loginAs(name) {
  currentUser = name;
  records = getRecords();
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('hdr-name').textContent = name;
  document.getElementById('hdr-avatar').textContent = initial(name);
  fillSelects();
  switchTab('add');
  var _now = new Date();
  var _y = _now.getFullYear(), _m = _now.getMonth()+1, _d = _now.getDate();
  document.getElementById('f-date').value = _y + '-' + (_m<10?'0'+_m:''+_m) + '-' + (_d<10?'0'+_d:''+_d);
  renderSummary();
  updatePreview();
}

function logout() {
  currentUser = null; records = [];
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
  renderUserList();
}

function getMonths() {
  var now = new Date(), months = [];
  for (var i = 0; i < 6; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var y = d.getFullYear();
    var m = d.getMonth() + 1;
    var ym = y + '-' + (m < 10 ? '0' + m : '' + m);
    months.push({ ym: ym, label: y + '年' + m + '月' });
  }
  return months;
}
function fillSelects() {
  var html = getMonths().map(function(m) { return '<option value="' + m.ym + '">' + m.label + '</option>'; }).join('');
  ['sel-month','sel-month2','sel-month3'].forEach(function(id) { var el = document.getElementById(id); if(el) el.innerHTML = html; });
}
function switchTab(t) {
  var tabs = ['add','history','stats'];
  document.querySelectorAll('.tab').forEach(function(el,i) { el.classList.toggle('active', tabs[i]===t); });
  document.querySelectorAll('.view').forEach(function(el,i) { el.classList.toggle('active', tabs[i]===t); });
  if (t==='add') renderSummary();
  if (t==='history') renderHistory();
  if (t==='stats') renderStats();
}
function calcHours(s,e) {
  if (!s||!e) return 0;
  var sp=s.split(':').map(Number), ep=e.split(':').map(Number);
  var m=(ep[0]*60+ep[1])-(sp[0]*60+sp[1]);
  return (m<0?m+1440:m)/60;
}
function calcBooking(a) { return (!a||a<=0)?0:Math.floor(a/2400)*300; }
function calcSession(r) {
  var h=calcHours(r.start,r.end), hp=Math.round(h*250), gp=(r.glow||0)*100, lp=(r.lock||0)*600, bp=calcBooking(r.booking||0);
  return {hours:h,hourPay:hp,glowPay:gp,lockPay:lp,bookingPay:bp,total:hp+gp+lp+bp};
}
function updatePreview() {
  var s=document.getElementById('f-start').value, e=document.getElementById('f-end').value;
  var gl=parseInt(document.getElementById('f-glow').value)||0;
  var lk=parseInt(document.getElementById('f-lock').value)||0;
  var bk=parseInt(document.getElementById('f-booking').value)||0;
  var c=calcSession({start:s,end:e,glow:gl,lock:lk,booking:bk});
  document.getElementById('preview-rows').innerHTML=[
    {label:'時薪 × '+c.hours.toFixed(1)+' 小時',val:c.hourPay},
    {label:'螢光棒 × '+gl+' 支',val:c.glowPay},
    {label:'鎖台 × '+lk+' 次',val:c.lockPay},
    {label:'訂位 $'+bk.toLocaleString()+' 抽成',val:c.bookingPay},
  ].map(function(rw){return '<div class="preview-row"><span>'+rw.label+'</span><span class="val">$'+rw.val.toLocaleString()+'</span></div>';}).join('');
  document.getElementById('prev-total').textContent='$'+c.total.toLocaleString();
}
function renderSummary() {
  var ym=document.getElementById('sel-month').value;
  var recs=records.filter(function(r){return r.date.slice(0,7)===ym;}), pay=0;
  recs.forEach(function(r){pay+=calcSession(r).total;});
  document.getElementById('mini-summary').innerHTML=
    '<div class="sum-card"><div class="sum-num">'+recs.length+'</div><div class="sum-label">出場次數</div></div>'+
    '<div class="sum-card highlight"><div class="sum-num">$'+pay.toLocaleString()+'</div><div class="sum-label">本月薪資</div></div>';
}
function addRecord() {
  var date=document.getElementById('f-date').value, s=document.getElementById('f-start').value, e=document.getElementById('f-end').value;
  var gl=parseInt(document.getElementById('f-glow').value)||0, lk=parseInt(document.getElementById('f-lock').value)||0, bk=parseInt(document.getElementById('f-booking').value)||0;
  if (!date||!s||!e){showMsg('請填寫日期與時間');return;}
  records.unshift({id:Date.now(),date:date,start:s,end:e,glow:gl,lock:lk,booking:bk});
  save(); showMsg('已儲存！');
  ['f-glow','f-lock','f-booking'].forEach(function(id){document.getElementById(id).value='';});
  updatePreview();
  var ym=date.slice(0,7), sel=document.getElementById('sel-month');
  for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===ym){sel.selectedIndex=i;break;}}
  renderSummary();
}
function showMsg(m) { var el=document.getElementById('msg'); el.textContent=m; setTimeout(function(){el.textContent='';},2000); }
function renderHistory() {
  var ym=document.getElementById('sel-month2').value;
  var recs=records.filter(function(r){return r.date.slice(0,7)===ym;}), el=document.getElementById('records-list');
  if(!recs.length){el.innerHTML='<div class="empty">本月尚無記錄</div>';return;}
  el.innerHTML=recs.map(function(r){
    var c=calcSession(r), chips=[c.hours.toFixed(1)+' 小時'];
    if(r.glow) chips.push('螢光棒 ×'+r.glow);
    if(r.lock) chips.push('鎖台 ×'+r.lock);
    if(r.booking) chips.push('訂位 $'+r.booking.toLocaleString());
    return '<div class="rec-item"><div class="rec-top"><div class="rec-date">'+r.date+' '+r.start+'–'+r.end+'</div>'+
      '<div style="display:flex;align-items:center;gap:10px;"><div class="rec-total">$'+c.total.toLocaleString()+'</div>'+
      '<button class="btn-del" onclick="deleteRecord('+r.id+')">✕</button></div></div>'+
      '<div class="rec-chips">'+chips.map(function(ch){return '<span class="chip">'+ch+'</span>';}).join('')+'</div></div>';
  }).join('');
}
function deleteRecord(id) { records=records.filter(function(r){return r.id!==id;}); save(); renderHistory(); renderSummary(); }
function clearMonth() {
  var ym=document.getElementById('sel-month2').value;
  if(!confirm('確定清除本月所有記錄？')) return;
  records=records.filter(function(r){return r.date.slice(0,7)!==ym;}); save(); renderHistory(); renderSummary();
}
function renderStats() {
  var ym=document.getElementById('sel-month3').value;
  var recs=records.filter(function(r){return r.date.slice(0,7)===ym;}), tot={total:0,hourPay:0,glowPay:0,lockPay:0,bookingPay:0,hours:0,glow:0,lock:0};
  recs.forEach(function(r){var c=calcSession(r);tot.total+=c.total;tot.hourPay+=c.hourPay;tot.glowPay+=c.glowPay;tot.lockPay+=c.lockPay;tot.bookingPay+=c.bookingPay;tot.hours+=c.hours;tot.glow+=(r.glow||0);tot.lock+=(r.lock||0);});
  document.getElementById('st-total').textContent='$'+tot.total.toLocaleString();
  document.getElementById('st-breakdown').innerHTML=[
    {label:'出場次數',val:recs.length+' 次'},
    {label:'總工時',val:tot.hours.toFixed(1)+' 小時'},
    {label:'時薪收入（×$250）',val:'$'+tot.hourPay.toLocaleString()},
    {label:'螢光棒 '+tot.glow+' 支（×$100）',val:'$'+tot.glowPay.toLocaleString()},
    {label:'鎖台 '+tot.lock+' 次（×$600）',val:'$'+tot.lockPay.toLocaleString()},
    {label:'訂位抽成',val:'$'+tot.bookingPay.toLocaleString()},
  ].map(function(row){return '<div class="bk-row"><span class="bk-label">'+row.label+'</span><span class="bk-val">'+row.val+'</span></div>';}).join('');
}

renderUserList();
document.getElementById('new-name').addEventListener('keydown',function(e){if(e.key==='Enter') createUser();});
</script>
